name: CyberGuard CI

on:
  push:
    branches: [ "main", "master", "dev" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: windows-latest   # Required for System.Media.SoundPlayer (Windows-only API)

    steps:
      # 1. Check out source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'   # Change to 6.0.x or 7.0.x if your project targets an older version

      # 3. Restore NuGet dependencies
      - name: Restore dependencies
        run: dotnet restore

      # 4. Build the solution in Release mode
      - name: Build
        run: dotnet build --no-restore --configuration Release

      # 5. Run tests (if a test project is added later)
      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      # 6. Publish the application artifact
      - name: Publish
        run: dotnet publish --no-build --configuration Release --output ./publish

      # 7. Upload the published output so it can be downloaded from GitHub Actions
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cyberguard-release
          path: ./publish
